<section id="appointment">

    <div class="booking-card">

        <h2>Book Your Massage Session</h2>

        <p>
            Complete the form below to reserve your preferred massage session.
            You'll be taken to the secure Bitcoin payment page to complete your booking.
        </p>

        <form action="payment.html" method="GET">

            <label>Full Name</label>
            <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required>

            <label>Phone Number</label>
            <input
                type="tel"
                name="phone"
                placeholder="Enter your phone number"
                required>

            <label>Select Massage Package</label>

            <select name="service" required>

                <option value="">Choose a massage package</option>

                <option value="Swedish Massage - 1 Hour - $120">
                    Swedish Massage — 1 Hour ($120)
                </option>

                <option value="Deep Tissue Massage - 1 Hour - $120">
                    Deep Tissue Massage — 1 Hour ($120)
                </option>

                <option value="Relaxation Massage - 1 Hour - $120">
                    Relaxation Massage — 1 Hour ($120)
                </option>

                <option value="Swedish Massage - 2 Hours - $250">
                    Swedish Massage — 2 Hours ($250)
                </option>

                <option value="Deep Tissue Massage - 2 Hours - $250">
                    Deep Tissue Massage — 2 Hours ($250)
                </option>

                <option value="Relaxation Massage - 2 Hours - $250">
                    Relaxation Massage — 2 Hours ($250)
                </option>

                <option value="3 Hours Massage Session - $400">
                    3 Hours Massage Session ($400)
                </option>

                <option value="Boyfriend Package - $500">
                    Boyfriend Package ($500)
                </option>

            </select>

            <label>Preferred Date</label>

            <input
                type="date"
                name="date"
                required>

            <label>Special Request (Optional)</label>

            <textarea
                name="message"
                placeholder="Tell us if you have any special requests..."></textarea>

            <button class="button" type="submit">
                Continue To Bitcoin Payment
            </button>

        </form>

    </div>

</section>
